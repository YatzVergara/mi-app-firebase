<div class="dashboard">
  <header>
    <h1>🔥 Mi App Firebase</h1>
    <div class="user-info">
      <span>{{ (currentUser$ | async)?.email }}</span>
      <button class="logout" (click)="logout()">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <!-- Formulario agregar tarea -->
    <div class="card form-card">
      <h3>{{ editingTask ? '✏️ Editar Tarea' : '➕ Nueva Tarea' }}</h3>
      <input
        type="text"
        placeholder="Título de la tarea"
        [(ngModel)]="newTitle"
      />
      <input
        type="text"
        placeholder="Descripción"
        [(ngModel)]="newDescription"
      />
      <div class="form-buttons">
        <button (click)="saveTask()">
          {{ editingTask ? 'Actualizar' : 'Agregar Tarea' }}
        </button>
        <button class="cancel" *ngIf="editingTask" (click)="cancelEdit()">
          Cancelar
        </button>
      </div>
    </div>

    <!-- Lista de tareas -->
    <div class="tasks-container">
      <h3>📋 Mis Tareas ({{ tasks.length }})</h3>

      <div *ngIf="tasks.length === 0" class="empty">
        ¡No tienes tareas aún! Agrega una arriba 👆
      </div>

      <div class="task-card" *ngFor="let task of tasks"
           [class.completed]="task.completed">
        <div class="task-info">
          <h4>{{ task.title }}</h4>
          <p>{{ task.description }}</p>
        </div>
        <div class="task-actions">
          <button class="complete" (click)="toggleComplete(task)">
            {{ task.completed ? '↩️' : '✅' }}
          </button>
          <button class="edit" (click)="startEdit(task)">✏️</button>
          <button class="delete" (click)="deleteTask(task.id!)">🗑️</button>
        </div>
      </div>
    </div>
  </main>
</div>
